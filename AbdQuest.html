*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0f;font-family:Georgia,serif;color:#e8dcc8;overflow-x:hidden;padding-top:env(safe-area-inset-top);}
input,textarea,button{font-family:Georgia,serif;}
input,textarea{outline:none;-webkit-appearance:none;}
button{-webkit-appearance:none;cursor:pointer;}
::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
@keyframes fadeUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-36px)}}
@keyframes popIn{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.fadeUp{animation:fadeUp 1.4s ease forwards;pointer-events:none;position:absolute;z-index:20;}
.popIn{animation:popIn 0.35s ease;}
</style>

<script>
(function(){
'use strict';
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;

// STORAGE
var MAIN_KEY='abdquest_v2',BAK_KEY='abdquest_v2_backup';
function vState(s){return s&&typeof s==='object'&&['xp','streak','done','habits','prayers'].every(function(k){return k in s;});}
function savMain(s){
  try{localStorage.setItem(MAIN_KEY,JSON.stringify(s));}catch(e){}
  try{if(window.fbReady)fbSave(s);}catch(e){}
}
function savBak(s){try{localStorage.setItem(BAK_KEY,JSON.stringify(s));}catch(e){}}
function loadSafe(){
  try{var r=localStorage.getItem(MAIN_KEY);if(r){var p=JSON.parse(r);if(vState(p))return p;}}catch(e){}
  try{var r2=localStorage.getItem(BAK_KEY);if(r2){var p2=JSON.parse(r2);if(vState(p2))return p2;}}catch(e2){}
  return null;
}

// HELPERS
function today(){return new Date().toISOString().split('T')[0];}
function getLogicalDay(fajrTime){
  // If before Fajr, still treat as yesterday
  if(!fajrTime)return today();
  var now=new Date();
  var parts=fajrTime.split(':');
  var fajr=new Date();fajr.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  if(now<fajr){var y=new Date(now);y.setDate(y.getDate()-1);return y.toISOString().split('T')[0];}
  return today();
}
function fmtD(d){var p=d.split('-');return p[2]+'/'+p[1];}
function getLvl(xp){for(var i=LEVELS.length-1;i>=0;i--)if(xp>=LEVELS[i].minXp)return LEVELS[i];return LEVELS[0];}
function getNextLvl(xp){var c=getLvl(xp);return LEVELS.find(function(l){return l.level===c.level+1;})||c;}
function getWeekMon(){var d=new Date(),day=d.getDay(),m=new Date(d);m.setDate(d.getDate()-day+(day===0?-6:1));return m.toISOString().split('T')[0];}
function getDailyCh(key){var h=0;for(var i=0;i<key.length;i++)h=((h<<5)-h)+key.charCodeAt(i);return DAILY_CH[Math.abs(h)%DAILY_CH.length];}
function getPenalty(xp,days){if(days<=0)return 0;return Math.round(xp*Math.min(1,0.2+(days-1)*0.13));}
function getMissColor(d){if(!d)return null;if(d===1)return'#ddaa22';if(d<=2)return'#dd7722';if(d<=4)return'#cc3322';return'#aa1111';}
function getSleepQ(hrs){if(hrs<5)return{label:'Bad',color:'#cc3322'};if(hrs<7)return{label:'Average',color:'#ddaa22'};if(hrs<9)return{label:'Good',color:'#44aa44'};return{label:'Excellent',color:'#4488ff'};}
function randItem(luck){
  luck=luck||1;var r=Math.random();
  var byR=function(rr){return ITEMS.filter(function(i){return i.rarity===rr;});};
  var pick=function(a){return a[Math.floor(Math.random()*a.length)];};
  if(r<0.05*luck)return pick(byR('legendary'));
  if(r<0.15*luck)return pick(byR('epic'));
  if(r<0.40*luck)return pick(byR('rare'));
  return pick(byR('common'));
}
function toHijri(date){
  var d=date.getDate(),m=date.getMonth()+1,y=date.getFullYear();
  var jd=Math.floor((14-m)/12),ya=y+4800-jd,ma=m+12*jd-3;
  var J=d+Math.floor((153*ma+2)/5)+365*ya+Math.floor(ya/4)-Math.floor(ya/100)+Math.floor(ya/400)-32045;
  var l=J-1948440+10632,n=Math.floor((l-1)/10631);l=l-10631*n+354;
  var j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  var hm=Math.floor((24*l)/709),hd=l-Math.floor((709*hm)/24),hy=30*n+j-30;
  var months=['Muharram','Safar',"Rabi' I","Rabi' II",'Jumada I','Jumada II','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhu al-Qi'dah",'Dhu al-Hijjah'];
  return hd+' '+months[hm-1]+' '+hy+' AH';
}

function Heatmap(props){
  var log=props.log,C=props.C,totalQ=props.totalQ||1;
  // Build a map of date -> completion percentage using total quest count as denominator
  var logMap={};
  log.forEach(function(en){
    var done=Object.values(en.done||{}).filter(Boolean).length;
    // Use totalQ passed in (non-bonus quest count) as the denominator
    logMap[en.date]=done/totalQ;
  });
  function heatCol(pct,hasDat){
    if(!hasDat)return '#1a1a2a';
    if(pct===0)return '#6b1a1a';          // 0% — red
    if(pct<=0.25)return '#8a4a00';        // 1-25% — orange
    if(pct<=0.50)return '#8a8000';        // 26-50% — yellow
    if(pct<=0.75)return '#2a6a2a';        // 51-75% — light green
    if(pct<1)return '#1a8a3a';            // 76-99% — green
    return '#00aa44';                      // 100% — dark green
  }
  var weeks=[],cur=new Date(),td=today();cur.setDate(cur.getDate()-175);
  var week=[];
  while(cur<=new Date()){
    var key=cur.toISOString().split('T')[0];
    var hasDat=key in logMap;
    var pct=logMap[key]||0;
    var isFut=key>td;
    var col=isFut?'transparent':hasDat?heatCol(pct,true):heatCol(0,key<=td?false:false);
    if(!isFut&&!hasDat)col='#1a1a2a';
    if(!isFut&&hasDat)col=heatCol(pct,true);
    var pctStr=hasDat?Math.round(pct*100)+'%':'no data';
    week.push(h('div',{key:key,title:key+' — '+pctStr,style:{width:11,height:11,borderRadius:2,background:col,flexShrink:0}}));
    if(week.length===7){weeks.push(h('div',{key:key+'w',style:{display:'flex',flexDirection:'column',gap:2}},week));week=[];}
    cur.setDate(cur.getDate()+1);
  }
  if(week.length)weeks.push(h('div',{key:'last',style:{display:'flex',flexDirection:'column',gap:2}},week));
  return h('div',null,
    h('div',{style:{display:'flex',gap:2,overflowX:'auto',paddingBottom:4}},weeks),
    h('div',{style:{display:'flex',gap:8,marginTop:8,fontSize:9,flexWrap:'wrap'}},
      h('span',{style:{color:'#6b1a1a'}},'🟥 0%'),
      h('span',{style:{color:'#8a4a00'}},'🟧 ≤25%'),
      h('span',{style:{color:'#8a8000'}},'🟨 ≤50%'),
      h('span',{style:{color:'#2a6a2a'}},'🟩 ≤75%'),
      h('span',{style:{color:'#00aa44'}},'🟢 100%')
    )
  );
}

<script>
// GitHub API sync — user provides their own token, stored in localStorage only
// Token never leaves the device except to go directly to GitHub API
var GH_OWNER='dodothedoom';
var GH_REPO='abdquest';
var GH_FILE='abdquest_data.json';
var GH_API='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
window.ghSaveTimer=null;

function ghGetToken(){
  try{return localStorage.getItem('abdquest_gh_token')||'';}catch(e){return '';}
}
function ghSetToken(t){
  try{localStorage.setItem('abdquest_gh_token',t);}catch(e){}
}

// Get current file SHA (needed for updates)
function ghGetSHA(token){
  return fetch(GH_API,{
    headers:{
      'Authorization':'token '+token,
      'Accept':'application/vnd.github.v3+json'
    }
  }).then(function(r){
    if(r.status===404)return null;
    return r.json().then(function(d){return d.sha||null;});
  }).catch(function(){return null;});
}

// Save to GitHub
function ghSave(state){
  var token=ghGetToken();
  if(!token)return;
  if(window.ghSaveTimer)clearTimeout(window.ghSaveTimer);
  window.ghSaveTimer=setTimeout(function(){
    try{
      var clean=JSON.stringify(state);
      var encoded=btoa(unescape(encodeURIComponent(clean)));
      ghGetSHA(token).then(function(sha){
        var body={
          message:'Abd Quest auto-save '+new Date().toISOString(),
          content:encoded
        };
        if(sha)body.sha=sha;
        return fetch(GH_API,{
          method:'PUT',
          headers:{
            'Authorization':'token '+token,
            'Accept':'application/vnd.github.v3+json',
            'Content-Type':'application/json'
          },
          body:JSON.stringify(body)
        });
      }).then(function(r){
        if(r&&r.ok)console.log('[GH] Saved to GitHub');
        else console.warn('[GH] Save failed');
      }).catch(function(e){console.warn('[GH] Save error:',e);});
    }catch(e){console.warn('[GH] Save error:',e);}
  },8000);
}

// Load from GitHub
function ghLoad(){
  var token=ghGetToken();
  if(!token)return Promise.resolve(null);
  return fetch(GH_API,{
    headers:{
      'Authorization':'token '+token,
      'Accept':'application/vnd.github.v3+json'
    }
  }).then(function(r){
    if(!r.ok)return null;
    return r.json();
  }).then(function(d){
    if(!d||!d.content)return null;
    var decoded=decodeURIComponent(escape(atob(d.content.replace(/
/g,''))));
    var parsed=JSON.parse(decoded);
    if(parsed&&typeof parsed==='object')return parsed;
    return null;
  }).catch(function(e){
    console.warn('[GH] Load failed:',e);
    return null;
  });
}
window.fbReady=true;
console.log('[GH] GitHub sync ready');
</script>

function today(){return new Date().toISOString().split('T')[0];}
function getLogicalDay(fajrTime){
  // If before Fajr, still treat as yesterday
  if(!fajrTime)return today();
  var now=new Date();
  var parts=fajrTime.split(':');
  var fajr=new Date();fajr.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  if(now<fajr){var y=new Date(now);y.setDate(y.getDate()-1);return y.toISOString().split('T')[0];}
  return today();
}

function toHijri(date){
  var d=date.getDate(),m=date.getMonth()+1,y=date.getFullYear();
  var jd=Math.floor((14-m)/12),ya=y+4800-jd,ma=m+12*jd-3;
  var J=d+Math.floor((153*ma+2)/5)+365*ya+Math.floor(ya/4)-Math.floor(ya/100)+Math.floor(ya/400)-32045;
  var l=J-1948440+10632,n=Math.floor((l-1)/10631);l=l-10631*n+354;
  var j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  var hm=Math.floor((24*l)/709),hd=l-Math.floor((709*hm)/24),hy=30*n+j-30;

}

function Heatmap(props){

    if(pct<=0.25)return '#8a4a00';        // 1-25% — orange
    if(pct<=0.50)return '#8a8000';        // 26-50% — yellow
    if(pct<=0.75)return '#2a6a2a';        // 51-75% — light green
    if(pct<1)return '#1a8a3a';            // 76-99% — green
    return '#00aa44';                      // 100% — dark green
  }
  var weeks=[],cur=new Date(),td=today();cur.setDate(cur.getDate()-175);
  var week=[];
  while(cur<=new Date()){
    var key=cur.toISOString().split('T')[0];

    var pct=logMap[key]||0;
    var isFut=key>td;
    var col=isFut?'transparent':hasDat?heatCol(pct,true):heatCol(0,key<=td?false:false);
    if(!isFut&&!hasDat)col='#1a1a2a';
    if(!isFut&&hasDat)col=heatCol(pct,true);
    var pctStr=hasDat?Math.round(pct*100)+'%':'no data';
    week.push(h('div',{key:key,title:key+' — '+pctStr,style:{width:11,height:11,borderRadius:2,background:col,flexShrink:0}}));
    if(week.length===7){weeks.push(h('div',{key:key+'w',style:{display:'flex',flexDirection:'column',gap:2}},week));week=[];}
    cur.setDate(cur.getDate()+1);
  }
  if(week.length)weeks.push(h('div',{key:'last',style:{display:'flex',flexDirection:'column',gap:2}},week));
  return h('div',null,
    h('div',{style:{display:'flex',gap:2,overflowX:'auto',paddingBottom:4}},weeks),
    h('div',{style:{display:'flex',gap:8,marginTop:8,fontSize:9,flexWrap:'wrap'}},
      h('span',{style:{color:'#6b1a1a'}},'🟥 0%'),
      h('span',{style:{color:'#8a4a00'}},'🟧 ≤25%'),
      h('span',{style:{color:'#8a8000'}},'🟨 ≤50%'),
      h('span',{style:{color:'#2a6a2a'}},'🟩 ≤75%'),
      h('span',{style:{color:'#00aa44'}},'🟢 100%')
    )
  );
}

function genRC(st,weekLog){
  var gm=function(p){if(p>=90)return'S';if(p>=80)return'A';if(p>=65)return'B';if(p>=50)return'C';if(p>=35)return'D';return'F';};
  var qd=weekLog.filter(function(d){return d.allDone;}).length;
  var pd=weekLog.filter(function(d){return PIDs.every(function(p){return d.done&&d.done[p];});}).length;
  var cd=weekLog.filter(function(d){var c=(st.calLog||[]).find(function(en){return en.date===d.date;});return c&&c.cal<=st.calTarget;}).length;
  var wd=weekLog.filter(function(d){var w=(st.waterLog||[]).find(function(en){return en.date===d.date;});return w&&w.ml>=(st.waterTarget||3000);}).length;
  var sd=weekLog.filter(function(d){var s=(st.sleepLog||[]).find(function(en){return en.date===d.date;});return s&&s.hrs>=7;}).length;
  var wkd=(st.workouts||[]).filter(function(w){return weekLog.some(function(d){return d.date===w.date;});}).length;
  var qp=Math.round((qd/7)*100),pp=Math.round((pd/7)*100),cp=Math.round((cd/7)*100),wp=Math.round((wd/7)*100),sp=Math.round((sd/7)*100),wkp=Math.min(100,Math.round((wkd/4)*100));
  var ov=Math.round((qp+pp+cp+wp+sp+wkp)/6);
  return{qp:qp,pp:pp,cp:cp,wp:wp,sp:sp,wkp:wkp,ov:ov,grade:gm(ov),date:today()};
}

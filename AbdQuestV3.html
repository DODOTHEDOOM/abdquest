const randItem=()=>{
  const r=Math.random();
  const byR=rr=>ITEMS.filter(i=>i.rarity===rr);
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  if(r<0.05)return pick(byR('legendary'));
  if(r<0.15)return pick(byR('epic'));
  if(r<0.40)return pick(byR('rare'));
  return pick(byR('common'));
};
const toHijri=date=>{
  const d=date.getDate(),m=date.getMonth()+1,y=date.getFullYear();
  let jd=Math.floor((14-m)/12),ya=y+4800-jd,ma=m+12*jd-3;
  let J=d+Math.floor((153*ma+2)/5)+365*ya+Math.floor(ya/4)-Math.floor(ya/100)+Math.floor(ya/400)-32045;
  let l=J-1948440+10632,n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  let j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  let hm=Math.floor((24*l)/709),hd=l-Math.floor((709*hm)/24),hy=30*n+j-30;
  const months=['Muharram','Safar',"Rabi' I","Rabi' II",'Jumada I','Jumada II','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhu al-Qi'dah",'Dhu al-Hijjah'];
  return `${hd} ${months[hm-1]} ${hy} AH`;
};

    calTarget:1900,wtTarget:120,startWt:152,sleepLog:[],weeklyChDone:{},weeklyChCustom:[],currentWeek:'',reportCards:[],foodLog:[],
    calLog:[],wtLog:[],waterLog:[],
    debt:{...DEF_DEBT},prayerHist:{},notes:{},
    challengeDone:{},waterToday:0,workouts:[],theme:'dark',
  };
  if(!saved)return base;
  const s={...base,...saved};
  if(saved.lastDay!==td){
    const yp={};PIDs.forEach(p=>{yp[p]=!!(saved.done||{})[p];});
    const nd={...(saved.debt||DEF_DEBT)};PIDs.forEach(p=>{if(!yp[p])nd[p]=(nd[p]||0)+1;});
    const allIds=[...(saved.habits||DEF_HABITS),...(saved.prayers||DEF_PRAYERS),...(saved.life||DEF_LIFE)].map(h=>h.id);
    const allDone=allIds.length>0&&allIds.every(id=>(saved.done||{})[id]);
    return{...s,done:{},doneChores:{},chores:(saved.chores||[]).filter(c=>!c.once||!(saved.doneChores||{})[c.id]),
      lastDay:td,streak:allDone?(saved.streak||0)+1:0,debt:nd,waterToday:0,
      prayerHist:{...(saved.prayerHist||{}),[saved.lastDay]:yp},
      log:[...(saved.log||[]),{date:saved.lastDay,done:saved.done||{},allDone}]};
  }
  return s;
}

// ─── Mini SVG Chart ───────────────────────────────────────────────────────────
function MiniChart({data,xKey,lines,refY,refCol,C}){
  if(!data||!data.length)return e('div',{style:{textAlign:'center',color:C.fnt,padding:30,fontSize:12}},'No data yet. Start logging!');
  const vals=lines.flatMap(l=>data.map(d=>+d[l.k]||0)).filter(v=>v>0);
  if(!vals.length)return e('div',{style:{textAlign:'center',color:C.fnt,padding:30,fontSize:12}},'No data yet.');
  const W=320,H=140,PL=36,PB=24,PT=6,PR=6;
  const IW=W-PL-PR,IH=H-PT-PB;
  const minV=Math.min(...vals)*0.95,maxV=Math.max(...vals)*1.05;
  const sx=i=>i>0?(i/(data.length-1))*IW+PL:PL;
  const sy=v=>H-PB-((v-minV)/(maxV-minV||1))*IH;
  const showEv=Math.ceil(data.length/5);
  return e('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:'auto'}},
    [0,0.5,1].map((t,i)=>{
      const y=H-PB-t*IH,val=Math.round(minV+t*(maxV-minV));
      return e('g',{key:i},
        e('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:C.bdr,strokeDasharray:'3,3',strokeWidth:0.5}),
        e('text',{x:PL-3,y:y+4,textAnchor:'end',fontSize:8,fill:C.dim},val)
      );
    }),
    refY&&refY>minV&&refY<maxV&&e('line',{x1:PL,y1:sy(refY),x2:W-PR,y2:sy(refY),stroke:refCol||C.gold,strokeDasharray:'4,4',strokeWidth:1}),
    data.map((d,i)=>i%showEv===0&&e('text',{key:i,x:sx(i),y:H-PB+14,textAnchor:'middle',fontSize:8,fill:C.dim},d[xKey])),
    lines.map((ln,li)=>{
      const pts=data.map((d,i)=>`${sx(i)},${sy(+d[ln.k]||0)}`).join(' ');
      return e('g',{key:li},
        e('polyline',{points:pts,fill:'none',stroke:ln.col,strokeWidth:2}),
        data.map((d,i)=>e('circle',{key:i,cx:sx(i),cy:sy(+d[ln.k]||0),r:3,fill:ln.col}))
      );
    })
  );
}

// ─── Prayer Times Hook ────────────────────────────────────────────────────────
function usePT(){
  const[times,setTimes]=useState(null);
  const[nxt,setNxt]=useState(null);
  const[cd,setCd]=useState('');
  const tRef=useRef(null);
  function compNext(t){
    if(!t)return;
    const now=new Date();
    const ents=Object.entries(t).map(([name,time])=>{
      const[hh,mm]=time.split(':').map(Number);
      const d=new Date();d.setHours(hh,mm,0,0);return{name,time,date:d};
    });
    const fut=ents.filter(e2=>e2.date>now);
    setNxt(fut.length?fut[0]:null);
  }
  useEffect(()=>{
    const ck='pt_'+today();const cached=sessionStorage.getItem(ck);
    if(cached){const t=JSON.parse(cached);tRef.current=t;setTimes(t);compNext(t);return;}
    fetch('https://api.aladhan.com/v1/timings?latitude=53.3811&longitude=-1.4701&method=2')
      .then(r=>r.json()).then(d=>{
        const t=d.data.timings;
        const rel={Fajr:t.Fajr,Sunrise:t.Sunrise,Dhuhr:t.Dhuhr,Asr:t.Asr,Maghrib:t.Maghrib,Isha:t.Isha};
        sessionStorage.setItem(ck,JSON.stringify(rel));tRef.current=rel;setTimes(rel);compNext(rel);
      }).catch(()=>{});
  },[]);
  useEffect(()=>{
    if(!nxt)return;
    const iv=setInterval(()=>{
      const diff=nxt.date-new Date();
      if(diff<=0){compNext(tRef.current);return;}
      const hh=Math.floor(diff/3600000),mm=Math.floor((diff%3600000)/60000),ss=Math.floor((diff%60000)/1000);
      setCd(`${hh>0?hh+'h ':''}${mm}m ${ss}s`);
    },1000);
    return()=>clearInterval(iv);
  },[nxt]);
  return{times,nxt,cd};
}

function Heatmap({log,C}){
  const weeks=[];const now=new Date();const start=new Date(now);start.setDate(start.getDate()-175);
  const logMap={};log.forEach(e=>{logMap[e.date]=e.allDone?1:Object.values(e.done||{}).some(Boolean)?0.5:0;});
  const cur=new Date(start);let week=[];
  while(cur<=now){
    const key=cur.toISOString().split('T')[0];const val=logMap[key];
    const col=val===1?'#2a8a2a':val===0.5?'#8a6a00':key<=today()?'#1a1a2a':'transparent';
    week.push(h('div',{key:key,title:key,style:{width:11,height:11,borderRadius:2,background:col,flexShrink:0}}));
    if(week.length===7){weeks.push(h('div',{key:key+'w',style:{display:'flex',flexDirection:'column',gap:2}},week));week=[];}
    cur.setDate(cur.getDate()+1);
  }
  if(week.length)weeks.push(h('div',{key:'last',style:{display:'flex',flexDirection:'column',gap:2}},week));
  return h('div',null,h('div',{style:{display:'flex',gap:2,overflowX:'auto',paddingBottom:4}},weeks),h('div',{style:{display:'flex',gap:12,marginTop:8,fontSize:10,color:C.dim}},h('span',null,'⬜ No data'),h('span',{style:{color:'#8a6a00'}},'🟨 Partial'),h('span',{style:{color:'#2a8a2a'}},'🟩 Perfect')));
}

function generateRC(st,weekLog){
  const gradeMap=p=>{if(p>=90)return'S';if(p>=80)return'A';if(p>=65)return'B';if(p>=50)return'C';if(p>=35)return'D';return'F';};
  const allH=[...st.habits,...st.prayers,...st.life];
  const qd=weekLog.filter(d=>d.allDone).length;const qp=Math.round((qd/7)*100);
  const pd=weekLog.filter(d=>PIDs.every(p=>d.done?.[p])).length;const pp=Math.round((pd/7)*100);
  const cd=weekLog.filter(d=>{const c=st.calLog.find(e=>e.date===d.date);return c&&c.cal<=st.calTarget;}).length;const cp=Math.round((cd/7)*100);
  const wd=weekLog.filter(d=>{const w=st.waterLog.find(e=>e.date===d.date);return w&&w.ml>=2000;}).length;const wp=Math.round((wd/7)*100);
  const sd=weekLog.filter(d=>{const s=(st.sleepLog||[]).find(e=>e.date===d.date);return s&&s.hrs>=7;}).length;const sp=Math.round((sd/7)*100);
  const wkd=(st.workouts||[]).filter(w=>weekLog.some(d=>d.date===w.date)).length;const wkp=Math.min(100,Math.round((wkd/4)*100));
  const ov=Math.round((qp+pp+cp+wp+sp+wkp)/6);
  return{qp,pp,cp,wp,sp,wkp,ov,grade:gradeMap(ov),date:today()};
}

// ── DUAL SAVE SYSTEM ──────────────────────────────────────────────────────────
const SK_MAIN='abdquest_v2';
const SK_BACKUP='abdquest_v2_backup';

function validateState(s){
  if(!s||typeof s!=='object')return false;
  const required=['xp','streak','done','habits','prayers'];
  return required.every(k=>k in s);
}

function saveMain(state){
  try{
    const data=JSON.stringify({...state,_savedAt:Date.now()});
    localStorage.setItem(SK_MAIN,data);
    return true;
  }catch(e){console.warn('Main save failed:',e);return false;}
}

function saveBackup(state){
  try{
    const data=JSON.stringify({...state,_savedAt:Date.now()});
    localStorage.setItem(SK_BACKUP,data);
    return true;
  }catch(e){console.warn('Backup save failed:',e);return false;}
}

function fullSave(state){
  saveMain(state);
  // Backup saves every 30s via heartbeat, not every single change
}

function loadSafe(){
  // Try main
  try{
    const raw=localStorage.getItem(SK_MAIN);
    if(raw){const parsed=JSON.parse(raw);if(validateState(parsed)){console.log('Loaded from main save');return parsed;}}
  }catch(e){console.warn('Main save corrupted, trying backup...');}
  // Try backup
  try{
    const raw=localStorage.getItem(SK_BACKUP);
    if(raw){const parsed=JSON.parse(raw);if(validateState(parsed)){console.log('Loaded from backup save');return parsed;}}
  }catch(e){console.warn('Backup also corrupted, starting fresh');}
  return null;
}

function schedulePrayerNotifications(prayerTimes){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  if(!prayerTimes)return;
  const prayers=[
    {name:'Fajr',key:'Fajr',msg:"🌅 Fajr time — don't miss the most important prayer of the day"},
    {name:'Duhr',key:'Dhuhr',msg:"☀️ Duhr time — step away for a moment and pray"},
    {name:'Asr',key:'Asr',msg:"🌤️ Asr time — yalla Dodo, don't let this one slip"},
    {name:'Maghrib',key:'Maghrib',msg:"🌇 Maghrib time — sun is setting, prayer time"},
    {name:'Isha',key:'Isha',msg:"🌙 Isha time — last prayer of the day, make it count"},
  ];
  // Clear any existing prayer notification timers
  if(window._prayerTimers){window._prayerTimers.forEach(t=>clearTimeout(t));}
  window._prayerTimers=[];
  const now=new Date();
  prayers.forEach(pr=>{
    const timeStr=prayerTimes[pr.key];
    if(!timeStr)return;
    const[hh,mm]=timeStr.split(':').map(Number);
    const pDate=new Date();pDate.setHours(hh,mm,0,0);
    const diff=pDate-now;
    if(diff>0&&diff<86400000){
      const t=setTimeout(()=>{
        try{new Notification(`${pr.name} Prayer`,{body:pr.msg,icon:'data:image/svg+xml,'+encodeURIComponent(APP_LOGO_SVG),tag:'prayer_'+pr.key,requireInteraction:false});}
        catch(e){}
      },diff);
      window._prayerTimers.push(t);
    }
  });
  console.log('Prayer notifications scheduled for today');
}

    {h:17,m:0,msg:"El streak bta3tak bet3ab lamma enta bet3ab — check in"},
    {h:21,m:0,msg:"Evening check — how many quests done today?"},
    {h:23,m:0,msg:"Final call ya Dodo — sleep before 1AM, tick your remaining quests"},
  ];
  if(window._nudgeTimers){window._nudgeTimers.forEach(t=>clearTimeout(t));}
  window._nudgeTimers=[];
  const now=new Date();
  nudgeTimes.forEach(n=>{
    const nDate=new Date();nDate.setHours(n.h,n.m,0,0);
    const diff=nDate-now;
    if(diff>0&&diff<86400000){
      const t=setTimeout(()=>{
        try{new Notification("Abd's Quest",{body:n.msg,icon:'data:image/svg+xml,'+encodeURIComponent(APP_LOGO_SVG),tag:'nudge_'+n.h,requireInteraction:false});}
        catch(e){}
      },diff);
      window._nudgeTimers.push(t);
    }
  });
}

async function requestNotificationPermission(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied')return false;
  const result=await Notification.requestPermission();
  return result==='granted';
}

// ── FOOD SEARCH COMPONENT ─────────────────────────────────────────────────────
function FoodTracker({st,setSt,C}){
  const[query,setQuery]=useState('');
  const[results,setResults]=useState([]);
  const[selected,setSelected]=useState(null);
  const[grams,setGrams]=useState('100');
  const[apiStatus,setApiStatus]=useState('idle');

  const foodLog=st.foodLog||[];
  const totalCals=foodLog.reduce((s,f)=>s+f.calories,0);
  const totalProt=foodLog.reduce((s,f)=>s+(f.protein||0),0);

  function onSearch(q){
    setQuery(q);setSelected(null);
    if(q.length<2){setResults([]);return;}
    // Try local first
    const local=searchFood(q);
    setResults(local);
    // Try Open Food Facts API
    if(q.length>=3){
      setApiStatus('loading');
      fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments&countries_tags=en:united-kingdom`)
        .then(r=>r.json())
        .then(data=>{
          if(data.products&&data.products.length){
            const apiResults=data.products
              .filter(p=>p.product_name&&p.nutriments&&p.nutriments['energy-kcal_100g'])
              .map(p=>({
                n:p.product_name,
                c:Math.round(p.nutriments['energy-kcal_100g']),
                p:Math.round(p.nutriments['proteins_100g']||0),
                api:true,
              })).slice(0,6);
            // Merge: local results first, then API
            const merged=[...local,...apiResults.filter(a=>!local.some(l=>l.n.toLowerCase()===a.n.toLowerCase()))].slice(0,10);
            setResults(merged);
          }
          setApiStatus('done');
        }).catch(()=>{setApiStatus('error');});
    }
  }

  function selectFood(food){setSelected(food);setGrams('100');setResults([]);setQuery(food.n);}

  function addFood(){
    if(!selected)return;
    const g=parseFloat(grams);
    if(!g||g<=0||g>5000)return;
    const{calories,protein}=calcFoodCals(selected,g);
    const entry={name:selected.n,grams:g,calories,protein,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})};
    setSt(p=>{
      const newLog=[...(p.foodLog||[]),entry];
      const newTotalCals=newLog.reduce((s,f)=>s+f.calories,0);
      return{...p,foodLog:newLog,
        // Also update the calLog entry for today so the existing graph stays in sync
        calLog:[...p.calLog.filter(e2=>e2.date!==today()),{date:today(),cal:newTotalCals,prot:newLog.reduce((s,f)=>s+(f.protein||0),0)}].sort((a,b)=>a.date.localeCompare(b.date))
      };
    });
    setQuery('');setSelected(null);setGrams('100');
  }

  function removeFood(idx){
    setSt(p=>{
      const newLog=(p.foodLog||[]).filter((_,i)=>i!==idx);
      const newTotalCals=newLog.reduce((s,f)=>s+f.calories,0);
      return{...p,foodLog:newLog,
        calLog:[...p.calLog.filter(e=>e.date!==today()),..( newTotalCals>0?[{date:today(),cal:newTotalCals,prot:newLog.reduce((s,f)=>s+(f.protein||0),0)}]:[])].sort((a,b)=>a.date.localeCompare(b.date))
      };
    });
  }

  const calsLeft=st.calTarget-totalCals;

  return h('div',null,
    // Summary bar
    h('div',{style:{...cs(C,{marginBottom:12,background:totalCals>=st.calTarget?`${C.grn}22`:`${C.amb}`,border:`1px solid ${totalCals>=st.calTarget?C.grn:C.gold+'33'}`})}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
        h('div',null,
          h('div',{style:{fontSize:11,color:C.dim}},'CALORIES TODAY'),
          h('div',{style:{fontSize:22,fontWeight:'bold',color:totalCals>=st.calTarget?C.grnT:C.gold}},totalCals),
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:11,color:C.dim}},'REMAINING'),
          h('div',{style:{fontSize:22,fontWeight:'bold',color:calsLeft>=0?C.blueT:C.redT}},calsLeft>=0?calsLeft:`+${Math.abs(calsLeft)} over`),
        )
      ),
      h('div',{style:{height:8,background:C.bdr,borderRadius:4,overflow:'hidden',marginBottom:6}},
        h('div',{style:{height:'100%',width:`${Math.min(100,(totalCals/st.calTarget)*100)}%`,background:totalCals>=st.calTarget?`linear-gradient(90deg,${C.grn},${C.grnT})`:`linear-gradient(90deg,${C.goldD},${C.gold})`,borderRadius:4,transition:'width 0.4s'}})
      ),
      h('div',{style:{fontSize:11,color:C.dim}},`Protein: ${totalProt}g · Target: ${st.calTarget} kcal`)
    ),
    // Search
    h('div',{style:{...cs(C,{marginBottom:12})}},
      h('div',{style:{fontSize:12,color:C.gold,marginBottom:8,fontWeight:'bold'}},'🔍 Search & Add Food'),
      h('input',{value:query,onChange:e=>onSearch(e.target.value),placeholder:'Search food... (e.g. chicken breast, rice)',style:{...ins(C),marginBottom:7}}),
      // Quick serving buttons when food selected
      selected&&h('div',null,
        h('div',{style:{fontSize:11,color:C.dim,marginBottom:5}},`Selected: ${selected.n} · ${selected.c} kcal/100g`),
        h('div',{style:{display:'flex',gap:6,marginBottom:7}},
          [100,150,200,250,300].map(g=>h('button',{key:g,onClick:()=>setGrams(String(g)),style:{...bs(C,grams===String(g),C.gold),padding:'5px 9px',fontSize:11,flex:1}},`${g}g`))
        ),
        h('div',{style:{display:'flex',gap:7}},
          h('input',{type:'number',value:grams,onChange:e=>setGrams(e.target.value),placeholder:'grams',style:{...ins(C),flex:1,textAlign:'center'},min:'1',max:'5000'}),
          h('div',{style:{...cs(C,{flex:1,textAlign:'center',padding:'8px',fontSize:11})}},
            h('div',{style:{color:C.gold,fontWeight:'bold',fontSize:15}},`${calcFoodCals(selected,parseFloat(grams)||0).calories} kcal`),
            h('div',{style:{color:C.dim,fontSize:10}},`${calcFoodCals(selected,parseFloat(grams)||0).protein}g protein`)
          )
        ),
        h('button',{onClick:addFood,style:{...bs(C,true,C.gold),width:'100%',fontSize:13,padding:'10px',marginTop:7,fontWeight:'bold'}},'+ Add to Today')
      ),
      // Search results
      results.length>0&&!selected&&h('div',{style:{border:`1px solid ${C.bdr}`,borderRadius:8,overflow:'hidden'}},
        results.map((food,i)=>h('div',{key:i,onClick:()=>selectFood(food),style:{padding:'10px 14px',borderBottom:`1px solid ${C.bdr}`,cursor:'pointer',background:i%2===0?C.card:`${C.bdr}22`,display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',null,
            h('div',{style:{fontSize:13,color:C.txt}},food.n),
            food.api&&h('div',{style:{fontSize:9,color:C.telT}},'Open Food Facts')
          ),
          h('div',{style:{textAlign:'right',flexShrink:0,marginLeft:8}},
            h('div',{style:{fontSize:12,color:C.gold,fontWeight:'bold'}},`${food.c} kcal`),
            h('div',{style:{fontSize:10,color:C.dim}},'per 100g')
          )
        ))
      ),
      apiStatus==='loading'&&h('div',{style:{fontSize:11,color:C.dim,textAlign:'center',padding:8}},'Searching online...')
    ),
    // Today's food log
    foodLog.length>0&&h('div',null,
      h('div',{style:{fontSize:11,color:C.dim,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8}},"Today's Food Log"),
      foodLog.map((entry,i)=>h('div',{key:i,style:{...cs(C,{marginBottom:6,padding:'10px 13px',display:'flex',alignItems:'center',gap:10})}},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:13,color:C.txt,fontWeight:'bold'}},entry.name),
          h('div',{style:{fontSize:11,color:C.dim}},`${entry.grams}g · ${entry.time||''}`)
        ),
        h('div',{style:{textAlign:'right',flexShrink:0}},
          h('div',{style:{fontSize:13,color:C.gold,fontWeight:'bold'}},`${entry.calories} kcal`),
          h('div',{style:{fontSize:10,color:C.blueT}},`${entry.protein||0}g protein`)
        ),
        h('button',{onClick:()=>removeFood(i),style:{background:'none',border:'none',color:C.fnt,fontSize:18,lineHeight:1,flexShrink:0}},'×')
      ))
    ),
    foodLog.length===0&&h('div',{style:{textAlign:'center',color:C.fnt,padding:20,fontSize:12}},"No food logged yet. Search above to start tracking.")
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(e(App));
})();
</script>
